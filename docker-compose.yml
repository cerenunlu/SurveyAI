version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: survey-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: survey_ai
      POSTGRES_USER: survey_ai_user
      POSTGRES_PASSWORD: survey_ai_password
    ports:
      - "5432:5432"
    volumes:
      - survey_ai_postgres_data:/var/lib/postgresql/data

volumes:
  survey_ai_postgres_data:
