spring:
  application:
    name: survey-ai-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/survey_ai
    username: survey_ai_user
    password: survey_ai_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080

surveyai:
  dev:
    provider-result-simulator-enabled: false
  calling:
    active-provider: MOCK
    mock:
      enabled: true
      base-url: mock://local
    elevenlabs:
      enabled: false
      base-url: https://api.elevenlabs.io
      api-key: ${ELEVENLABS_API_KEY:}
      agent-id: ${ELEVENLABS_AGENT_ID:}
      phone-number-id: ${ELEVENLABS_PHONE_NUMBER_ID:}
      webhook-secret: ${ELEVENLABS_WEBHOOK_SECRET:}
      sandbox-mode: ${ELEVENLABS_SANDBOX_MODE:true}
      webhook-timestamp-tolerance-seconds: 300
      settings:
        call-recording-enabled: ${ELEVENLABS_CALL_RECORDING_ENABLED:false}
        public-webhook-base-url: ${PUBLIC_WEBHOOK_BASE_URL:}

logging:
  level:
    org.flywaydb: info
