spring:
  application:
    name: survey-ai-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/survey_ai
    username: survey_ai_user
    password: survey_ai_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080

logging:
  level:
    org.flywaydb: info
