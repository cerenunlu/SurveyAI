spring:
  application:
    name: survey-ai-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/survey_ai
    username: survey_ai_user
    password: survey_ai_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080

surveyai:
  dev:
    provider-result-simulator-enabled: false
  calling:
    active-provider: ${SURVEYAI_CALLING_ACTIVE_PROVIDER:MOCK}
    mock:
      enabled: ${SURVEYAI_CALLING_MOCK_ENABLED:true}
      base-url: mock://local
    elevenlabs:
      enabled: ${SURVEYAI_CALLING_ELEVENLABS_ENABLED:false}
      mode: ${ELEVENLABS_MODE:MOCK}
      base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io}
      api-key: ${ELEVENLABS_API_KEY:}
      agent-id: ${ELEVENLABS_AGENT_ID:}
      phone-number-id: ${ELEVENLABS_PHONE_NUMBER_ID:}
      webhook-secret: ${ELEVENLABS_WEBHOOK_SECRET:}
      sandbox-mode: ${ELEVENLABS_SANDBOX_MODE:false}
      webhook-timestamp-tolerance-seconds: 300
      settings:
        call-recording-enabled: ${ELEVENLABS_CALL_RECORDING_ENABLED:false}
        public-webhook-base-url: ${PUBLIC_WEBHOOK_BASE_URL:}
        tool-api-secret: ${ELEVENLABS_TOOL_API_SECRET:${ELEVENLABS_WEBHOOK_SECRET:}}
        agent-prompt-override-enabled: ${ELEVENLABS_AGENT_PROMPT_OVERRIDE_ENABLED:false}
        agent-first-message-override-enabled: ${ELEVENLABS_AGENT_FIRST_MESSAGE_OVERRIDE_ENABLED:false}
        agent-language-override-enabled: ${ELEVENLABS_AGENT_LANGUAGE_OVERRIDE_ENABLED:false}

logging:
  level:
    org.flywaydb: info
